{{- if .Values.serviceAccount.create -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "janet-world.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "janet-world.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
# janet-world-server is a pure bus participant — it communicates exclusively
# via NATS and does not access the Kubernetes API.  No ClusterRole is required.
# Add a Role/RoleBinding here if future versions need to read Secrets or
# ConfigMaps for dynamic configuration.
